name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela corridas viejas del mismo ref para no malgastar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # --legacy-peer-deps: @testing-library/react aún declara un peer de React
      # más estricto que el 19 del proyecto; la resolución real es correcta.
      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://app.yitopro.com
          NEXT_PUBLIC_API_MOCKING: disabled
